name: Tests

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run pytest with coverage
        run: python -m pytest --cov=agora --cov-report=term-missing --cov-report=xml

      - name: Publish coverage summary
        if: github.event_name == 'pull_request'
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          tree = ET.parse("coverage.xml")
          rate = float(tree.getroot().attrib.get("line-rate", 0.0)) * 100
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("## Coverage\n")
                  handle.write(f"\nTotal line coverage: {rate:.2f}%\n")
          else:
              print(f"Total line coverage: {rate:.2f}%")
          PY
